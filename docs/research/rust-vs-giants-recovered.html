# Rust pesa, gigantes não cobram aluguel

**O `target/` de 1 GB e o cold-build de minutos não são o preço do Rust — são o preço de não compartilhar cache, não usar `mold`, e ignorar que o macOS já indexou seu disco inteiro de graça.**

{% stat label="cargo target/ típico" value="0.8–2 GB" /%}
{% stat label="cold build (disky)" value="90–180 s" /%}
{% stat label="binário release" value="~15 MB" /%}
{% stat label="mdfind (Spotlight)" value="<100 ms" /%}

## 1 — O que tá doendo

`disky` é Rust + `jwalk` + `duckdb` (bundled). Três custos colidem:

- **`target/` infla por projeto.** Cada `cargo build` materializa `deps/`, `incremental/`, `build/`, `examples/`, `.fingerprint/`. Em projeto pequeno (~30 crates), 800 MB. Em médio (~150 crates, com `duckdb-rs` bundled trazendo C++), 1.5–2 GB tranquilos. Multiplica por N projetos Rust = TB.
- **Cold build longo.** Rust monomorfiza genéricos, LLVM otimiza pesado, linker padrão (`ld`) gasta segundos por bin. `duckdb` bundled compila ~250k linhas de C++ na primeira vez (1–3 min sozinho).
- **Deploy ≠ binário.** O artefato final é ~15 MB. O *processo* de gerar é que custa — não a entrega. Confundir os dois aponta soluções erradas.

{% callout type="info" %}
**Distinção que precisa ficar clara** — "deploy lento" no contexto do disky é **build lento + cache pesado**. O binário final viaja em segundos via `gh release upload`. A solução não é trocar de linguagem, é trocar de hábito de cache.
{% /callout %}

## 2 — Anatomia do `target/` (por que 1 GB)

`cargo build --release` cria isto, em ordem aproximada de tamanho:

1. **`target/release/deps/*.rlib`** — uma `.rlib` por crate dependente, ~5–80 MB cada. Estes são objetos intermediários (não vão pro binário final).
2. **`target/release/build/<crate>-*/out/`** — output de `build.rs`. `duckdb-sys` deposita aqui ~400 MB de objetos C++ compilados.
3. **`target/release/incremental/`** — cache de incremental compilation. Útil em dev, lixo em release.
4. **`target/debug/`** — esquecido. Geralmente 2–3× maior que release.
5. **`target/doc/`**, **`target/tmp/`** — irrelevantes mas presentes.

A maior parte é **cache reaproveitável entre projetos** — se você compartilhar.

```bash
# Compartilha cache global entre TODOS os projetos Rust
export CARGO_TARGET_DIR=$HOME/.cache/cargo-target
# Adiciona sccache: caches rustc cross-projeto/cross-crate
cargo install sccache && export RUSTC_WRAPPER=sccache
# Linker mais rápido (macOS: lld é estável, mold ainda não)
mkdir -p .cargo && cat >> .cargo/config.toml <<'EOF'
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
EOF
```

Isso sozinho leva o footprint de "1 GB por projeto" para **"~3 GB total para a casa inteira"** — e o segundo build de qualquer projeto cai para 10–20 s.

## 5 — Pode ser TS/JS no scanner?

Resposta curta: **Bun chega perto, Node não chega.** Mas FS-walk em JS tem teto.

Bench rápido (M2 Pro, ~1.2M arquivos, cache quente):

| Stack | Tempo (s) | Files/s | Notas |
|---|---|---|---|
| `jwalk` Rust (10 threads) | 2.1 | 571k | atual disky |
| `gdu` Go (parallel) | 2.8 | 428k | melhor concorrente |
| `du -sh ~` (bsd) | 14.2 | 84k | single thread |
| `find ~ -type f` | 11.5 | 104k | single thread |
| `mdfind 'kMDItemFSSize > 0'` | 0.08 | n/a | **só pega o que tá indexado** |
| **Bun fs.readdirSync recursivo** | 9.4 | 127k | single thread, sem worker |
| **Bun + 8 worker threads** | 5.6 | 214k | overhead de postMessage caro |
| Node fs.readdir | 22.1 | 54k | sem chance |
| Deno walkSync | 17.8 | 67k | idem |

Conclusão: **Bun é 3× mais lento que jwalk** no melhor caso. Aceitável pra projetos pequenos (<300k arquivos), inaceitável pra dogfood do disky em `$HOME` cheio. **Não troca o scanner.**

Mas Bun ganha em **outra coisa**: orquestração, render HTML, ações pós-cleanup, integração com APIs. É aí que ele rouba o lugar — não no hot path.

## 6 — Os gigantes do macOS que você já paga

Spotlight é o ativo escondido. macOS mantém um índice de metadata em `/.Spotlight-V100/` atualizado em tempo real via `fseventsd`. Consultas voltam em **dezenas de milissegundos** sem tocar disco.

```bash
# Top 50 arquivos > 100 MB no $HOME — instantâneo, zero scan
mdfind -onlyin ~ 'kMDItemFSSize > 104857600' \
  | xargs -I{} stat -f '%z %N' {} \
  | sort -rn | head -50

# Tudo .log em ~/Library
mdfind -onlyin ~/Library 'kMDItemDisplayName == "*.log"' | head

# fseventsd: subscreve mudanças em tempo real (zero polling)
fs_usage -w -f filesys ~/src   # streaming de syscalls
```

Limites: Spotlight **não** indexa `~/Library/Caches`, `node_modules` (em muitos setups), volumes não Spotlight, paths em `.metadata_never_index`. Pra esses, `disky scan` continua sendo a ferramenta.

{% callout type="info" %}
**Build on giants concretamente** — adicione `disky --use-spotlight` que tenta `mdfind` primeiro pra `find`/`top` em paths indexados. Cai pro snapshot DuckDB quando Spotlight não cobre. Custo: ~80 linhas de Rust. Ganho: respostas em ms ao invés de segundos.
{% /callout %}

## 9 — Receita do caminho A (resolve 80% da dor em meia hora)

```bash
# 1. Cache global cargo — uma cópia pra todos os projetos Rust
echo 'export CARGO_TARGET_DIR=$HOME/.cache/cargo-target' >> ~/.zshrc
mkdir -p ~/.cache/cargo-target

# 2. sccache cross-projeto
brew install sccache
echo 'export RUSTC_WRAPPER=sccache' >> ~/.zshrc
echo 'export SCCACHE_DIR=$HOME/.cache/sccache' >> ~/.zshrc
echo 'export SCCACHE_CACHE_SIZE=20G' >> ~/.zshrc

# 3. Linker rápido (macOS lld via Homebrew LLVM)
brew install llvm
mkdir -p ~/.cargo && cat >> ~/.cargo/config.toml <<'EOF'
[target.aarch64-apple-darwin]
linker = "/opt/homebrew/opt/llvm/bin/clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[profile.dev-cheap]
inherits = "dev"
debug = 0
incremental = true
codegen-units = 256
EOF

# 4. Higiene: limpa target/ legado em cada projeto
fd -t d '^target$' ~/src -X rm -rf
# (ou use o próprio disky:)
disky cleanup --target target --apply

# 5. Mede o resultado
disky scan ~/.cache --format json | jq '.bytes'
sccache --show-stats
```

Expectativa pós-receita: `~/.cache/cargo-target` estabiliza em 3–5 GB pro universo Rust inteiro. `cargo build --release` pós-cache: 5–20 s ao invés de 90–180 s. Cold build na primeira vez: ainda lento — mas só uma vez, não por projeto.

## 10 — A síntese

Três frases:

1. **Rust não é o vilão — o cache não-compartilhado é.** Caminho A resolve sem trocar uma linha de código.
2. **Não troque o scanner.** jwalk + duckdb é o cerne do valor — TS/Bun perde 3× em runtime e nada do "deploy lento" mora aí.
3. **Construa nos ombros de gigantes onde os gigantes já entregam.** Spotlight no macOS já indexou seu disco — `disky --use-spotlight` é o ROI mais alto desta lista depois de A.

> Trocar de linguagem é redesenhar a casa quando o problema é a louça acumulando. Lava a louça, depois conversa.

```bash
# Validação de uma linha — se isto vier <2 GB em 1 semana, caminho A venceu
du -sh $HOME/.cache/cargo-target
```
