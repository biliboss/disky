# disky v0.10.0 — CLI é a superfície

**Cortamos 925 LOC de MCP, descartamos o plano de `disky web`, e bumpamos pra v0.10.0. Resultado: uma superfície, um contrato, manutenção 6× menor.**

{% stat label="LOC removidas" value="925" /%}
{% stat label="Net diff" value="−922" /%}
{% stat label="Bins" value="2 → 1" /%}

## 1 — A decisão

`disky` nasceu como CLI rápido pra agentes. Em maio adicionei `disky-mcp` (13 tools) e planejei `disky web` (FastHTML server) pensando em cobrir hosts que não fazem shell out. Funcionou — mas **única consumidora real** sempre foi Claude Code, que executa CLI direto via `Bash`. Cada tool MCP só duplicava o envelope JSON da CLI.

- `disky-mcp` = 925 LOC num arquivo único, zero deps a mais
- `disky web` = não-construído, 3 items na punch list
- 8 dos 17 must-ship da v0.10.0 eram MCP-only — zero entregavam valor pro user

{% callout type="info" %}
**Validado por grill** — 4 perguntas em sessão `dc2884dc` (2026-05-27) cobriram destino do código MCP, modelo de botões sem web, shape do fluxo skill, versionamento. Default recomendado bateu confidence ≥65% em todas.
{% /callout %}

## 2 — O que mudou

Cortamos uma superfície inteira, não um feature isolado. Mudança vem em três camadas: **código** (delete + Cargo), **doc** (AGENTS.md + CHANGELOG), **escopo** (8 items da punch-list pré-emptados).

1. `git rm src/bin/disky-mcp.rs` — 925 linhas, history preserva
2. `Cargo.toml` — bump `0.6.0 → 0.10.0`, remoção de `[[bin]] disky-mcp`
3. `AGENTS.md` — rewrite das seções "MCP scope" + "Three surfaces" pra "Single surface — CLI only"
4. `CHANGELOG.md` — entrada v0.10.0 com resurrection path explícito

{% callout type="warn" %}
**BREAKING** — `disky-mcp` bin sumiu. Profiles `.claude-pessoal` e `.claude-mukutu` ainda têm a entry `mcpServers.disky` apontando pro caminho antigo. Limpe manualmente — bili não vai conseguir invocar uma tool que não existe.
{% /callout %}

Antes: 2 caminhos vivos pro mesmo DuckDB, ambos com superfície de JSON envelope. Depois: 1 caminho, CLI, com a skill `/disky` como camada de UX ON TOP (não substitui — embrulha). O ponto de decisão que sumiu foi "qual surface o agent escolhe?" — agora não tem escolha, e isso é o ganho.

## 5 — Bonus · NotebookLM rate-test

Durante o grill paralelizamos `notebooklm source add` pra ver se valia ingerir os 204 URLs do spec MCP. Achado vira patch pro bili `knowledge new`.

{% callout type="ok" %}
**Acionável bili** — trocar loop sequencial 3-4s/URL por `asyncio.Semaphore(10)` no `bili knowledge new`. 204 URLs vão de ~13min → ~3min. Zero rate-limit até P=20.
{% /callout %}

Notebook MCP foi criado mesmo assim (`0e703189-34a8-42f6-88fe-acb2bada1852`, 236 sources ready) — fica no esperando earn-back, não bloqueia release.

## 6 — Take-aways

Esse é um release que **encolhe**. Em geral software cresce — adicionar features é mais fácil que apagar. Mas quando a única consumidora real está num caminho específico, a coisa certa é seguir o caminho, não a opcionalidade. Resurrection é barato (1 active day de `git log`); manutenção contínua de surface morta é cara.

> A melhor superfície é a única que tem usuário.
